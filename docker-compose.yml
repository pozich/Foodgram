version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: foodgram_api
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - ADMINS_ID=${ADMINS_ID}
    depends_on:
      - db
    ports:
      - "8000:8000"

  bot:
    build: ./bot
    container_name: foodgram_bot
    env_file: .env
    depends_on:
      - api
    restart: always

  web:
    build: ./web
    container_name: foodgram_web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
